<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" href="StarCraft.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-orange: #d29922;
      --accent-red: #f85149;
      --race-t: #74c0fc;
      --race-p: #b197fc;
      --race-z: #69db7c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    header { text-align: center; margin-bottom: 2.5rem; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: var(--text-muted); font-size: 0.9rem; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--bg-card);
      margin-bottom: 2rem;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent-blue);
      background: var(--bg-hover);
    }

    .drop-zone .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.7; }
    .drop-zone p { color: var(--text-muted); font-size: 0.95rem; }
    .drop-zone .hint { margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.8; }

    input[type="file"] { display: none; }

    .result { display: none; }
    .result.visible { display: block; }

    .game-info {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      border: 1px solid var(--border);
    }

    .game-info span { color: var(--text-muted); font-size: 0.9rem; }
    .game-info strong { color: var(--accent-blue); }

    .build-orders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .time-mode-toggle {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .time-mode-toggle select {
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
    }

    .time-mode-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
    }

    .chat-toggle-row {
      margin: 0.5rem 0 0.25rem;
      display: flex;
      justify-content: flex-end;
    }

    .chat-toggle-btn {
      background: transparent;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--accent-blue);
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .chat-toggle-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent-blue);
    }

    .chat-panel {
      display: none;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      max-height: 240px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }

    .chat-item {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.25rem;
    }

    .chat-item:last-child {
      margin-bottom: 0;
    }

    .chat-time {
      color: var(--text-muted);
    }

    .chat-player {
      color: var(--accent-green);
    }

    .chat-target {
      color: var(--text-muted);
    }

    .chat-text {
      color: var(--text);
    }

    .build-item.upgrade .unit {
      color: var(--accent-red);
    }

    .build-item.upgrade .time {
      color: var(--accent-red);
    }

    .build-item.recall .unit {
      color: var(--accent-blue);
    }

    .build-item.recall .time {
      color: var(--accent-blue);
    }

    /* 单位训练：橙色，建筑保持默认白色 */
    .build-item.unit .unit {
      color: var(--accent-orange);
    }

    @media (max-width: 768px) {
      .build-orders { grid-template-columns: 1fr; }
    }

    .player-panel {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .player-header {
      padding: 1rem 1.25rem;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-header.team1 {
      background: linear-gradient(90deg, rgba(116, 192, 252, 0.15), transparent);
    }

    .player-header.team2 {
      background: linear-gradient(90deg, rgba(249, 81, 73, 0.15), transparent);
    }

    .race-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .race-badge.T { background: rgba(116, 192, 252, 0.3); color: var(--race-t); }
    .race-badge.P { background: rgba(177, 151, 252, 0.3); color: var(--race-p); }
    .race-badge.Z { background: rgba(105, 219, 124, 0.3); color: var(--race-z); }

    .build-list { max-height: 400px; overflow-y: auto; }

    .build-item {
      display: grid;
      grid-template-columns: 60px 50px 1fr;
      gap: 0.75rem;
      padding: 0.5rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .build-item:last-child { border-bottom: none; }
    .build-item:hover { background: var(--bg-hover); }
    .build-item .time { color: var(--text-muted); font-weight: 500; }
    .build-item .supply { color: var(--accent-orange); font-size: 0.8rem; }
    .build-item .unit { color: var(--text); }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      display: none;
    }

    .loading.visible { display: block; }

    .loading .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 1rem;
      color: var(--accent-red);
      margin-bottom: 1rem;
      display: none;
    }

    .error.visible { display: block; }

    .init-status {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .init-status .progress {
      margin-top: 1rem;
      color: var(--accent-blue);
    }
  </style>
</head>

    let pyodide = null;

    // SC2 默认「更快（Faster）」游戏时间与实际显示时间存在约 1.4 倍系数（仅用于单位事件的游戏秒）
    const GAME_TIME_FACTOR = 1.4;

    // 直接使用真实秒数（例如 replay.game_length.seconds）
    function formatRealTime(seconds) {
      const safe = Math.max(0, Math.round(seconds));
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 把游戏内部秒（frame/16）折算成接近游戏内计时的秒数
    function formatGameTime(gameSeconds) {
      const displaySeconds = Math.max(0, Math.round(gameSeconds / GAME_TIME_FACTOR));
      const m = Math.floor(displaySeconds / 60);
      const s = displaySeconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 把 Unix 时间戳格式化为本地时间字符串
    function formatRealWorldTime(timestamp) {
      if (!timestamp && timestamp !== 0) return '';
      const d = new Date(timestamp * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === undefined || bytes === null) return '';
      const thresh = 1024;
      if (bytes < thresh) return `${bytes} B`;
      const units = ['KB', 'MB', 'GB', 'TB'];
      let u = -1;
      let size = bytes;
      do {
        size /= thresh;
        ++u;
      } while (size >= thresh && u < units.length - 1);
      return `${size.toFixed(1)} ${units[u]}`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('visible');
      result.classList.remove('visible');
      loading.classList.remove('visible');
    }

    function hideError() {
      error.classList.remove('visible');
    }

    function setInitStatus(msg) {
      if (initProgress) initProgress.textContent = msg;
    }

    async function loadTranslationData() {
      try {
        const resp = await fetch('data.json', { cache: 'no-cache' });
        if (!resp.ok) {
          console.warn('data.json 加载失败:', resp.status);
          return;
        }
        translationData = await resp.json();

        console.warn('data.json 加载异常:', e);

    const PARSE_SCRIPT = `
import json
import sc2reader
from sc2reader.exceptions import ReadError
from sc2reader.events.tracker import UpgradeCompleteEvent
from sc2reader.events.game import CommandEvent, TargetPointCommandEvent, TargetUnitCommandEvent
from sc2reader.events.message import ChatEvent

EXCLUDE_UNIT_TYPES = {"BanelingCocoon", "BroodLordCocoon", "Larva"}
EXCLUDE_UPGRADES = {"SprayZerg", "SprayTerran", "SprayProtoss"}
ABILITY_UNIT_MAP = {
    # 临时：某些单位在 player.units 中缺失时，用技能事件补一条建造记录
    "TrainWarpPrism": "WarpPrism",
}

def extract_build_order(replay):
    # 开始时间（现实世界时间戳，秒）
    start_time = getattr(replay, "start_time", None)
    start_time_ts = None
    if start_time is not None:
        try:
            start_time_ts = int(start_time.timestamp())
        except Exception:
            start_time_ts = None

    result = {
        "map_name": getattr(replay, "map_name", "Unknown"),
        "game_length": getattr(getattr(replay, "game_length", None), "seconds", 0),
        "client_version": getattr(replay, "release_string", None),
        "region": getattr(replay, "region", None) or getattr(replay, "gateway", None),
        "start_time": start_time_ts,
        "winner": None,
        "teams": [],
        "chat": [],
    }

    # 收集每个玩家的升级事件（使用 UpgradeCompleteEvent）
    upgrade_events_by_pid = {}
    for ev in getattr(replay, "tracker_events", []):
        if isinstance(ev, UpgradeCompleteEvent):
            if ev.upgrade_type_name in EXCLUDE_UPGRADES:
                continue
            player = getattr(ev, "player", None)
            if player is None:
                continue
            sec = getattr(ev, "second", None)
            if sec is None:
                frame = getattr(ev, "frame", None)
                if frame is None:
                    continue
                sec = frame >> 4
            pid = getattr(player, "pid", None)
            if pid is None:
                continue
            upgrade_events_by_pid.setdefault(pid, []).append({
                "time": int(sec),
                "name": ev.upgrade_type_name,
            })

    # 收集每个玩家的「星空加速」（NexusMassRecall）施放事件
    recall_events_by_pid = {}
    # 收集通过技能推断的单位生产事件（如 WarpPrism）
    ability_units_by_pid = {}
    for ev in getattr(replay, "events", []):
        if not isinstance(ev, CommandEvent):
            continue
        if not getattr(ev, "has_ability", False):
            continue
        ability_name = getattr(ev, "ability_name", None)
        ability_obj = getattr(ev, "ability", None)
        ability_name2 = getattr(ability_obj, "name", None)
        ability_key = ability_name or ability_name2

        # 星空加速
        if ability_key == "NexusMassRecall":

            frame = getattr(ev, "frame", None)
            sec = getattr(ev, "second", None)
            if sec is None and frame is not None:
                sec = frame >> 4
            if sec is None:
                continue

            player = getattr(ev, "player", None)
            pid = getattr(player, "pid", None) if player is not None else None
            if pid is None:
                continue

            target_name = None
            if isinstance(ev, TargetUnitCommandEvent):
                target = getattr(ev, "target", None) or getattr(ev, "target_unit", None)
                target_name = getattr(target, "name", None)
            elif isinstance(ev, TargetPointCommandEvent):
                # 点地形时不用显示坐标，保持简洁
                target_name = None

            recall_events_by_pid.setdefault(pid, []).append({
                "time": int(sec),
                "target": target_name,
            })

        # 通过技能推断单位建造（例如 WarpPrism）
        if ability_key in ABILITY_UNIT_MAP:
            frame = getattr(ev, "frame", None)
            sec = getattr(ev, "second", None)
            if sec is None and frame is not None:
                sec = frame >> 4
            if sec is None:
                continue

            player = getattr(ev, "player", None)
            pid = getattr(player, "pid", None) if player is not None else None
            if pid is None:
                continue

            unit_name = ABILITY_UNIT_MAP[ability_key]
            ability_units_by_pid.setdefault(pid, []).append({
                "time": int(sec),
                "unit": unit_name,
            })

    # 收集对局聊天记录
    chat_log = []
    for ev in getattr(replay, "events", []):
        if not isinstance(ev, ChatEvent):
            continue

        frame = getattr(ev, "frame", None)
        sec = getattr(ev, "second", None)
        if sec is None and frame is not None:
            sec = frame >> 4
        if sec is None:
            continue

        player = getattr(ev, "player", None)
        name = getattr(player, "name", None) if player is not None else None
        pid = getattr(ev, "pid", None)
        target = getattr(ev, "target", None)
        text = getattr(ev, "text", "")

        chat_log.append({
            "time": int(sec),
            "player": name or "",
            "pid": pid,
            "target": target,
            "text": text,
        })

    result["chat"] = chat_log

    # 计算获胜方（可能多队并列获胜，例如多人合作）
    try:
        winners = []
        for team in getattr(replay, "teams", []):
            if getattr(team, "result", None) == "Win":
                names = [p.name or "Unknown" for p in getattr(team, "players", [])]
                if names:
                    winners.append(" & ".join(names))
        if winners:
            result["winner"] = " / ".join(winners)
    except Exception:
        pass

    for team in replay.teams:
        team_data = {"players": []}
        for player in team.players:
            build_order = []
            supply = 0
            units = []
            for unit in getattr(player, "units", []):
                if unit.hallucinated:
                    continue
                if unit.finished_at is None:
                    continue
                name = unit.name if hasattr(unit, "name") else (unit._type_class.name if unit._type_class else None)
                if name and name in EXCLUDE_UNIT_TYPES:
                    continue
                if name:
                    units.append((unit.finished_at, unit, name))
            units.sort(key=lambda x: (x[0], x[2]))
            for _, unit, name in units:
                unit_supply = unit.supply if unit.supply is not None else 0
                supply += unit_supply
                finish_time_sec = unit.finished_at >> 4
                start_time_sec = (unit.started_at >> 4) if getattr(unit, "started_at", None) is not None else finish_time_sec
                is_building = False
                _type = getattr(unit, "_type_class", None)
                if _type is not None:
                    is_building = bool(getattr(_type, "is_building", False))
                build_order.append({
                    "start_time": start_time_sec,
                    "finish_time": finish_time_sec,
                    "supply": max(0, int(supply)),
                    "unit": name,
                    "category": "building" if is_building else "unit",
                })
            race_char = (player.pick_race or "?")[0] if player.pick_race else "?"
            team_data["players"].append({
                "name": player.name or "Unknown",
                "race": race_char,
                "build_order": build_order,
                "upgrades": upgrade_events_by_pid.get(player.pid, []),
                "recalls": recall_events_by_pid.get(player.pid, []),
                "ability_units": ability_units_by_pid.get(player.pid, []),
            })
        result["teams"].append(team_data)
    return result

def parse_replay(path):
    replay = sc2reader.load_replay(path, load_level=4)
    return extract_build_order(replay)
`;

    async function parseReplayWithPyodide(file) {

          chatVisible = !chatVisible;
          chatPanel.style.display = chatVisible ? 'block' : 'none';
          chatToggle.textContent = chatVisible ? '隐藏对局聊天' : '查看对局聊天';
        });
      }

      try {
        // 记录文件基础信息（目前用于显示录像大小）
        lastFileMeta = {
          name: file.name,
          size: file.size,
        };

        const buffer = await file.arrayBuffer();
        const data = new Uint8Array(buffer);

        pyodide.FS.writeFile('/tmp/replay.SC2Replay', data);

        const parseCode = `
${PARSE_SCRIPT}
result = parse_replay("/tmp/replay.SC2Replay")
import json
json.dumps(result)
`;
        const resultJson = await pyodide.runPythonAsync(parseCode);
        const data2 = JSON.parse(resultJson);

        lastData = data2;

        pyodide.FS.unlink('/tmp/replay.SC2Replay');

        displayResult(data2);
      } catch (e) {
        console.error(e);
        showError(e.message || '解析失败，请检查文件格式');
      } finally {
        loading.classList.remove('visible');
      }
    }

    function getDisplayUnitText(item) {
      const name = item.unit || '';
      const kind = item._kind || '';

      // 勾选“显示原始英文名称”时，直接返回英文（升级保留前缀）
      if (showOriginal) {
        if (kind === 'upgrade') {
          return `升级完成：${name}`;
        }
        if (kind === 'recall') {
          const target = item.target || name || '';
          return target ? `星空加速 → ${target}` : '星空加速';
        }
        return name;
      }

      // 未加载翻译表时，尽量保留语义
      if (!translationData) {
        if (kind === 'upgrade') {
          return `升级完成：${name}`;
        }
        if (kind === 'recall') {
          const target = item.target || name || '';
          return target ? `星空加速 → ${target}` : '星空加速';
        }
        return name;
      }

      // 升级：升级完成：中文名[时间s]
      if (kind === 'upgrade') {
        const upInfo =
          (translationData.upgrade && translationData.upgrade[name]) || null;
        const zh = (upInfo && upInfo.zh) || name;
        const t = upInfo && typeof upInfo.time === 'number' ? upInfo.time : 0;
        const timePart = t > 0 ? `[${t}s]` : '';
        return `升级完成：${zh}${timePart}`;
      }

      // 星空加速：前缀固定 + 目标建筑翻译
      if (kind === 'recall') {
        const targetName = item.target || name || '';
        let zhTarget = null;

        if (translationData.unit && translationData.unit[targetName]) {
          zhTarget = translationData.unit[targetName].zh;
        }
        if (!zhTarget && translationData.build && translationData.build[targetName]) {
          zhTarget = translationData.build[targetName].zh;
        }
        if (!zhTarget && translationData.change) {
          for (const group of Object.values(translationData.change)) {
            if (group && group[targetName]) {
              zhTarget = group[targetName].zh;
              break;
            }
          }
        }

        const finalTarget = zhTarget || targetName;
        return finalTarget ? `星空加速 → ${finalTarget}` : '星空加速';
      }

      // 其它（单位/建筑等）：优先在 unit/build 查找
      let zh = null;

      if (translationData.unit && translationData.unit[name]) {
        zh = translationData.unit[name].zh;
      }

      if (!zh && translationData.build && translationData.build[name]) {
        zh = translationData.build[name].zh;
      }

      // change 里的别名等，遍历各个子分组
      if (!zh && translationData.change) {
        for (const group of Object.values(translationData.change)) {
          if (group && group[name]) {
            zh = group[name].zh;
            break;
          }
        }
      }

      return zh || name;
    }

    function renderChat(data) {
      if (!chatPanel || !chatToggle) return;

      const chats = Array.isArray(data.chat) ? [...data.chat] : [];

      if (!chats.length) {
        chatVisible = false;
        chatPanel.style.display = 'none';
        chatPanel.innerHTML = '';
        chatToggle.style.display = 'none';
        chatToggle.textContent = '查看对局聊天';
        return;
      }

      chats.sort((a, b) => {
        const ta = typeof a.time === 'number' ? a.time : (typeof a.second === 'number' ? a.second : 0);
        const tb = typeof b.time === 'number' ? b.time : (typeof b.second === 'number' ? b.second : 0);
        return ta - tb;
      });

      const rows = chats.map((msg) => {
        const tRaw = typeof msg.time === 'number' ? msg.time : (typeof msg.second === 'number' ? msg.second : 0);
        const tStr = formatGameTime(tRaw);
        const sender = msg.player || (msg.pid != null ? `P${msg.pid}` : '未知玩家');
        const target = msg.target || '所有人';
        const text = escapeHtml(msg.text || '');
        return `
          <div class="chat-item">
            <span class="chat-time">[${tStr}]</span>
            <span class="chat-player">${escapeHtml(sender)}</span>
            <span class="chat-target">(${escapeHtml(target)})</span>
            <span class="chat-text">${text}</span>
          </div>
        `;
      }).join('');

      chatPanel.innerHTML = rows;
      chatToggle.style.display = 'inline-flex';
      chatVisible = false;
      chatPanel.style.display = 'none';
      chatToggle.textContent = '查看对局聊天';
    }

    function displayResult(data) {
      const gameLen = data.game_length || 0;
      const clientVersion = data.client_version || '';
      const region = data.region || '';
      const startTs = data.start_time || null;
      const winner = data.winner || '';
      const startStr = startTs ? formatRealWorldTime(startTs) : '';
      const fileSizeStr = lastFileMeta ? formatFileSize(lastFileMeta.size) : '';

      const infoParts = [];
      infoParts.push(`<span><strong>地图</strong> ${data.map_name || 'Unknown'}</span>`);
      infoParts.push(`<span><strong>时长</strong> ${formatRealTime(gameLen)}</span>`);
      if (clientVersion) {
        infoParts.push(`<span><strong>客户端版本</strong> ${clientVersion}</span>`);
      }
      if (region) {
        infoParts.push(`<span><strong>服务器区域</strong> ${region}</span>`);
      }
      if (startStr) {
        infoParts.push(`<span><strong>开始时间</strong> ${startStr}</span>`);
      }
      if (winner) {
        infoParts.push(`<span><strong>胜者</strong> ${winner}</span>`);
      }
      if (fileSizeStr) {
        infoParts.push(`<span><strong>录像大小</strong> ${fileSizeStr}</span>`);
      }

      gameInfo.innerHTML = infoParts.join('');

      // 渲染聊天按钮和内容（如果有的话）
      renderChat(data);

      let html = '';
      const teamClasses = ['team1', 'team2'];
      data.teams.forEach((team, i) => {
        team.players.forEach((player) => {
          const race = (player.race || '?')[0].toUpperCase();
          const items = [...(player.build_order || [])];

          if (showUpgrades && Array.isArray(player.upgrades)) {
            player.upgrades.forEach((upg) => {
              const t = typeof upg.time === 'number' ? upg.time : 0;
              items.push({
                start_time: t,
                finish_time: t,
                supply: null,
                unit: upg.name, // 只存英文名，展示时再结合 data.json 生成中文+时间
                _kind: 'upgrade',
              });
            });
          }

          if (Array.isArray(player.recalls)) {
            player.recalls.forEach((rc) => {
              const t = typeof rc.time === 'number' ? rc.time : 0;
              items.push({
                start_time: t,
                finish_time: t,
                supply: null,
                unit: rc.target || '',
                target: rc.target || '',
                _kind: 'recall',
              });
            });
          }

          if (Array.isArray(player.ability_units)) {
            player.ability_units.forEach((au) => {
              const t = typeof au.time === 'number' ? au.time : 0;
              const name = au.unit || 'Unknown';
              items.push({
                start_time: t,
                finish_time: t,
                supply: null,
                unit: name,
                category: 'unit',
              });
            });
          }

          // 根据当前模式对条目按时间排序，保证时间轴从小到大
          items.sort((a, b) => {
            const aStart = typeof a.start_time === 'number' ? a.start_time : a.time;
            const aFinish = typeof a.finish_time === 'number' ? a.finish_time : a.time;
            const bStart = typeof b.start_time === 'number' ? b.start_time : b.time;
            const bFinish = typeof b.finish_time === 'number' ? b.finish_time : b.time;
            const ta = timeMode === 'finish' ? aFinish : aStart;
            const tb = timeMode === 'finish' ? bFinish : bStart;
            if (ta !== tb) return ta - tb;
            if (a.supply !== undefined && b.supply !== undefined && a.supply !== b.supply) {
              return a.supply - b.supply;
            }
            const au = a.unit || '';
            const bu = b.unit || '';
            return au.localeCompare(bu, 'en');
          });

          html += `
            <div class="player-panel">
              <div class="player-header ${teamClasses[i]}">
                <span class="race-badge ${race}">${race}</span>
                <span>${player.name || 'Unknown'}</span>
              </div>
              <div class="build-list">
                ${items.map((item) => {
                  const start = typeof item.start_time === 'number' ? item.start_time : item.time;
                  const finish = typeof item.finish_time === 'number' ? item.finish_time : item.time;
                  const chosen = timeMode === 'finish' ? finish : start;
                  const extraClasses = [];
                  if (item._kind === 'upgrade') extraClasses.push('upgrade');
                  if (item._kind === 'recall') extraClasses.push('recall');
                  if (item.category === 'unit') extraClasses.push('unit');
                  const extraClass = extraClasses.join(' ');
                  const unitText = getDisplayUnitText(item);
                  return `
                    <div class="build-item ${extraClass}">
                      <span class="time">${formatGameTime(chosen)}</span>
                      <span class="supply">${item.supply ?? ''}</span>
                      <span class="unit">${unitText}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        });
      });

      buildOrders.innerHTML = html;
      result.classList.add('visible');
    }

    async function initPyodide() {
      try {
        setInitStatus('加载 Pyodide 运行时...');
        const indexURL = `https://cdn.jsdelivr.net/pyodide/v${PYODIDE_VERSION}/full/`;
        pyodide = await loadPyodide({ indexURL });

        setInitStatus('安装 mpyq（从源码）...');
        const mpyqResp = await fetch('https://cdn.jsdelivr.net/gh/eagleflo/mpyq@master/mpyq.py');
        if (!mpyqResp.ok) throw new Error('mpyq 下载失败: ' + mpyqResp.status);
        const mpyqCode = await mpyqResp.text();
        pyodide.FS.mkdirTree('/tmp');
        pyodide.FS.writeFile('/tmp/mpyq.py', new TextEncoder().encode(mpyqCode));
        await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, "/tmp")
import mpyq
`);

        setInitStatus('安装 sc2reader...');
        await pyodide.loadPackage('micropip');
        await pyodide.runPythonAsync(`
import micropip
await micropip.install('sc2reader', deps=False)
`);

        initStatus.style.display = 'none';
        dropZone.style.display = 'block';
      } catch (e) {
        console.error(e);
        setInitStatus('');
        initStatus.innerHTML = `<p style="color:var(--accent-red)">初始化失败: ${e.message}</p><p style="margin-top:0.5rem;font-size:0.85rem">请检查网络连接后刷新重试。若为依赖安装失败，可尝试使用后端版本。</p>`;
      }
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.sc2replay')) {
        parseReplayWithPyodide(file);
      } else {
        showError('请上传 .SC2Replay 文件');
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) parseReplayWithPyodide(file);
      e.target.value = '';
    });

    // 并行初始化翻译数据与 Pyodide 环境
    loadTranslationData();
    initPyodide();
  </script>
</body>
</html>
