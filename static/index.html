<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC2 录像建造顺序查看器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-orange: #d29922;
      --accent-red: #f85149;
      --race-t: #74c0fc;
      --race-p: #b197fc;
      --race-z: #69db7c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--bg-card);
      margin-bottom: 2rem;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent-blue);
      background: var(--bg-hover);
    }

    .drop-zone .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }

    .drop-zone p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .drop-zone .hint {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    input[type="file"] {
      display: none;
    }

    .result {
      display: none;
    }

    .result.visible {
      display: block;
    }

    .game-info {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      border: 1px solid var(--border);
    }

    .game-info span {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .game-info strong {
      color: var(--accent-blue);
    }

    .build-orders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .build-orders {
        grid-template-columns: 1fr;
      }
    }

    .player-panel {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .player-header {
      padding: 1rem 1.25rem;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-header.team1 {
      background: linear-gradient(90deg, rgba(116, 192, 252, 0.15), transparent);
    }

    .player-header.team2 {
      background: linear-gradient(90deg, rgba(249, 81, 73, 0.15), transparent);
    }

    .race-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .race-badge.T { background: rgba(116, 192, 252, 0.3); color: var(--race-t); }
    .race-badge.P { background: rgba(177, 151, 252, 0.3); color: var(--race-p); }
    .race-badge.Z { background: rgba(105, 219, 124, 0.3); color: var(--race-z); }

    .build-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .build-item {
      display: grid;
      grid-template-columns: 60px 50px 1fr;
      gap: 0.75rem;
      padding: 0.5rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .build-item:last-child {
      border-bottom: none;
    }

    .build-item:hover {
      background: var(--bg-hover);
    }

    .build-item .time {
      color: var(--text-muted);
      font-weight: 500;
    }

    .build-item .supply {
      color: var(--accent-orange);
      font-size: 0.8rem;
    }

    .build-item .unit {
      color: var(--text);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      display: none;
    }

    .loading.visible {
      display: block;
    }

    .loading .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 1rem;
      color: var(--accent-red);
      margin-bottom: 1rem;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SC2 录像建造顺序查看器</h1>
      <p class="subtitle">拖入 .SC2Replay 文件，查看双方建造顺序</p>
    </header>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <p>将录像文件拖放到此处，或点击选择文件</p>
      <p class="hint">支持 .SC2Replay 格式</p>
      <input type="file" id="fileInput" accept=".SC2Replay,.sc2replay">
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在解析录像...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="game-info" id="gameInfo"></div>
      <div class="build-orders" id="buildOrders"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const gameInfo = document.getElementById('gameInfo');
    const buildOrders = document.getElementById('buildOrders');

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('visible');
      result.classList.remove('visible');
      loading.classList.remove('visible');
    }

    function hideError() {
      error.classList.remove('visible');
    }

    async function parseReplay(file) {
      hideError();
      loading.classList.add('visible');
      result.classList.remove('visible');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/api/parse', {
          method: 'POST',
          body: formData,
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = Array.isArray(data.detail) ? data.detail.map(d => d.msg || d).join('; ') : (data.detail || '解析失败');
          throw new Error(msg);
        }

        displayResult(data);
      } catch (e) {
        showError(e.message || '解析失败，请检查文件格式');
      } finally {
        loading.classList.remove('visible');
      }
    }

    function displayResult(data) {
      const gameLen = data.game_length || 0;
      gameInfo.innerHTML = `
        <span><strong>地图</strong> ${data.map_name || 'Unknown'}</span>
        <span><strong>时长</strong> ${formatTime(gameLen)}</span>
      `;

      let html = '';
      const teamClasses = ['team1', 'team2'];
      data.teams.forEach((team, i) => {
        team.players.forEach((player) => {
          const race = (player.race || '?')[0].toUpperCase();
          html += `
            <div class="player-panel">
              <div class="player-header ${teamClasses[i]}">
                <span class="race-badge ${race}">${race}</span>
                <span>${player.name || 'Unknown'}</span>
              </div>
              <div class="build-list">
                ${(player.build_order || []).map((item, idx) => `
                  <div class="build-item">
                    <span class="time">${formatTime(item.time)}</span>
                    <span class="supply">${item.supply}</span>
                    <span class="unit">${item.unit}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        });
      });

      buildOrders.innerHTML = html;
      result.classList.add('visible');
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.sc2replay')) {
        parseReplay(file);
      } else {
        showError('请上传 .SC2Replay 文件');
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) parseReplay(file);
      e.target.value = '';
    });
  </script>
</body>
</html>
